name: Java CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Compile all sources
        run: |
          mkdir -p out
          javac -cp "recycling_management_system/lib/*:src" -d out \
            recycling_management_system/src/Domain/*.java \
            recycling_management_system/src/Application/*.java \
            recycling_management_system/src/Test/*.java

      - name: Run tests
        run: |
          java -jar recycling_management_system/lib/junit-platform-console-standalone-1.13.0-M3.jar \
            --class-path out \
            --scan-class-path